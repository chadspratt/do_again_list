server {
    listen 80;
    server_name incrementallist.com www.incrementallist.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name incrementallist.com www.incrementallist.com;

    ssl_certificate /etc/letsencrypt/live/incrementallist.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/incrementallist.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # Use Docker's internal DNS so upstream resolves dynamically
    resolver 127.0.0.11 valid=30s;
    set $upstream http://app:8000;

    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
